name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build Bai03
        run: mvn clean package --file Bai03/pom.xml

      - name: Test Bai03
        run: mvn test --file Bai03/pom.xml

      - name: Build Bai04
        run: mvn clean package --file Bai04/pom.xml

      - name: Test Bai04
        run: mvn test --file Bai04/pom.xml

      - name: Verify Bai05 with JaCoCo
        run: mvn verify --file Bai05/pom.xml

      - name: Upload JaCoCo Report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report-${{ matrix.os }}
          path: Bai05/target/site/jacoco/

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: jars-${{ matrix.os }}
          path: |
            Bai03/target/*.jar
            Bai04/target/*.jar
            Bai05/target/*.jar